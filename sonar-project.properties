# SonarQube Community Build - whole-workspace analysis config.
# Run from this directory:  D:\sonar-scanner\bin\sonar-scanner.bat  (with -Dsonar.token=<token>)
sonar.projectKey=planet-zoo-ap
sonar.projectName=Planet Zoo AP Client
sonar.projectVersion=0.1

# Python source: the client package + the RE tooling. Tests are analyzed as test code.
sonar.sources=pz_ap_client,tools
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.10

# Exclude archived RE dead-ends, the (gitignored) vendored Archipelago tree, byte-caches,
# and the binary scan dumps the tools emit - none of which are project source.
sonar.exclusions=tools/_attic/**,vendor/**,**/__pycache__/**,**/*.bin,**/*.npy,**/*.meta,**/*.pyc

# Local Community Build server (started from D:\sonarqube).
sonar.host.url=http://localhost:9000
